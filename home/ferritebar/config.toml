[bar]
position = "top"
height = 28

[theme]
icon_theme = "YAMIS"
font = "Fira Sans"
font_size = 28
# Override colors (optional - auto-detected from GTK4 theme)
# success_color = "#a3be8c"
# warning_color = "#facc15"
# error_color = "#f87171"

[[modules.left]]
type = "workspaces"
format = "{index}"
show_hidden = false
scroll = true
sync_command = "labwc-niri sync {index}"
sync_only_active = true

[[modules.left]]
type = "memory"
format = "{icon}"
interval = 3
bar_width = 9
bar_height = 24

[[modules.left]]
type = "swap"
format = "{icon}"
interval = 5
bar_width = 9
bar_height = 28

[[modules.center]]
type = "taskbar"
display = "icon"  # "icon", "title", or "both"
icon_size = 32
max_title_length = 30

[[modules.right]]
type = "script"
name = "wg"
exec = "ip link show wg0 >/dev/null 2>&1 && printf '{\"text\":\"\\uf023\",\"class\":\"connected\"}' || printf '{\"text\":\"\\uf09c\",\"class\":\"disconnected\"}'"
interval = 30
return_type = "json"
on_click = "rest=\"$(printf '' | fuzzel --dmenu --prompt 'wgnord> ')\" && [ -n \"$rest\" ] && { sudo wgnord $rest && notify-send -a wgnord \"wgnord $rest\" OK || notify-send -a wgnord \"wgnord $rest\" FAILED; }"

[[modules.right]]
type = "tray"
icon_size = 20

[[modules.right]]
type = "network"
format = "{icon}"
interval = 10
on_click = "~/bin/fuzzelfi.sh"

[[modules.right]]
type = "audio"
format = "{icon}"
on_click = "wpctl set-mute @DEFAULT_SINK@ toggle"

[[modules.right]]
type = "battery"
format = "{icon}"
path = "/sys/class/power_supply/BAT0"
interval = 30
max_charge = 80

[[modules.right]]
type = "clock"
format = "%-I:%M %p"
tooltip_format = "%A, %B %d, %Y"

[[modules.right]]
type = "power"
hidden = true
lock_cmd = "swaylock"
suspend_cmd = "systemctl suspend"
reboot_cmd = "systemctl reboot"
shutdown_cmd = "systemctl poweroff"
